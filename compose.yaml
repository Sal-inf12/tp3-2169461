services:

  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    restart: unless-stopped

    networks:
      - cloud

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.portainer.rule=Host(`portainer.${MY_DOMAIN}`)'
      - 'traefik.http.routers.portainer.entryPoints=websecure'
      - 'traefik.http.services.portainer.loadbalancer.server.port=9000'
      - 'traefik.http.routers.portainer.service=portainer'

  nextclouddb:
    image: mysql:8.0
    container_name: nextcloud-db
    restart: unless-stopped

    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW

    networks:
      - cloud

    volumes:
      - nextclouddb:/var/lib/mysql

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Montreal

      - MYSQL_RANDOM_ROOT_PASSWORD=true
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USER}

  nextcloud:
    image: nextcloud
    container_name: nextcloud
    restart: unless-stopped

    networks:
      - cloud

    depends_on:
      - nextclouddb

    volumes:
      - ./html:/var/www/html
      - ./custom_apps:/var/www/html/custom_apps
      - ./config:/var/www/html/config
      - ./data:/var/www/html/data

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Montreal

      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USER}
      - MYSQL_HOST=nextclouddb

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nextcloud.rule=Host(`nextcloud.${MY_DOMAIN}`)'
      - 'traefik.http.routers.nextcloud.entryPoints=websecure'

  paperless-broker:
    image: redis:7
    container_name: paperless-redis
    restart: unless-stopped

    networks:
      - cloud

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    restart: unless-stopped

    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - paperless_pgdata:/var/lib/postgresql/data

    networks:
      - cloud

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped

    depends_on:
      - paperless-db
      - paperless-broker

    environment:
      - PAPERLESS_REDIS=redis://paperless-broker:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBUSER=${POSTGRES_USER}
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_DBNAME=${POSTGRES_DB}
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - PAPERLESS_URL=https://paperless.${MY_DOMAIN}

    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - ./consume:/usr/src/paperless/consume
      - ./export:/usr/src/paperless/export

    networks:
      - cloud

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.paperless.rule=Host(`paperless.${MY_DOMAIN}`)'
      - 'traefik.http.routers.paperless.entryPoints=websecure'
      - 'traefik.http.routers.paperless.tls.certresolver=letsencrypt'
      - 'traefik.http.services.paperless.loadbalancer.server.port=8000'

  proxy:
    image: traefik
    container_name: traefik
    restart: unless-stopped

    networks:
      - cloud

    command:
      - '--log.level=DEBUG'
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'

      - '--certificatesresolvers.letsencrypt.acme.dnschallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=duckdns'
      - '--certificatesresolvers.letsencrypt.acme.email=${MY_EMAIL}'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge.disablePropagationCheck=true'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'

      - '--entrypoints.web.address=:80'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'

      - '--entrypoints.websecure.address=:443'
      - '--entrypoints.websecure.http.tls=true'
      - '--entrypoints.websecure.http.tls.certResolver=letsencrypt'
      - '--entrypoints.websecure.http.tls.domains[0].main=${MY_DOMAIN}'
      - '--entrypoints.websecure.http.tls.domains[0].sans=*.${MY_DOMAIN}'

    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`${MY_DOMAIN}`)'
      - 'traefik.http.routers.api.entryPoints=websecure'
      - 'traefik.http.routers.api.service=api@internal'

    ports:
      - '80:80'
      - '443:443'

    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}

volumes:
  portainer_data:
  nextclouddb:
  paperless_pgdata:
  paperless_data:
  paperless_media:

networks:
  cloud:
    driver: bridge